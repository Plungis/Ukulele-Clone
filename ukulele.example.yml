config:
  token: ""              # Your discord bot token
  shards: 1              # Number of shards to create. 1 works for most bots
  prefix: "::"           # Prefix to invoke commands with
  database: "./database" # Database filename
  game: ""               # Status message shown when your bot is online
  trackDurationLimit: 0  # Maximum limit of track duration in minutes. Set to 0 for unlimited
  announceTracks: false  # Announce the start of a track
  spotifyClientId: ""    # Optional: Spotify app client id for more reliable Spotify URL resolving
  spotifyClientSecret: "" # Optional: Spotify app client secret
  spotifySpDc: ""        # Optional: Spotify sp_dc cookie for account-backed Spotify resolving
  spotifyCountryCode: "US"
  inactiveDisconnectMinutes: 15     # Leave after this many minutes paused or idle with no track playing
  emptyChannelDisconnectMinutes: 5  # Leave after this many minutes with no listeners in the voice channel
